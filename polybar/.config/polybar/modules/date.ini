[module/date]
type = internal/date
interval = 1

time-alt = "%H:%M"
time = "%d %b, %H:%M:%S"

format = <label>
format-prefix = 
format-prefix-foreground = ${colors.purple}
format-background = ${colors.bg}
format-foreground = ${colors.fg}
format-padding = 1
label = %{T0}%time%%{T-}
label-padding = 1
